name: ZVV Linie 33 Datensammler

on:
  schedule:
    # Der Bot versucht, alle 15 Minuten zu starten (kann bei GitHub manchmal verzögert sein)
    - cron: '*/15 * * * *'
  
  # Aktiviert den "Run workflow" Button bei GitHub Actions, damit du es manuell testen kannst
  workflow_dispatch:

# Gibt dem Workflow die Schreibrechte, um die Daten im Repository zu speichern
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # 1. Den Code aus deinem Repository auf den GitHub-Server laden
      - name: Repository auschecken
        uses: actions/checkout@v4

      # 2. Node.js (die Laufzeitumgebung für JavaScript) bereitstellen
      - name: Node.js bereitstellen
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Dein Skript "fetch.js" ausführen, um die Busdaten zu holen
      - name: Skript ausführen und Daten sammeln
        run: node fetch.js

      # 4. Die aktualisierten Daten automatisch wieder ins Repo pushen
      - name: Neue Daten sichern und hochladen
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Alle Änderungen (inklusive einer neu erstellten data.json) vormerken
          git add .
          
          # Nur committen und pushen, wenn sich wirklich etwas verändert hat
          if git diff --staged --quiet; then
            echo "Keine neuen Datenpunkte. Überspringe Upload."
          else
            git commit -m "Automatische Aktualisierung: Busdaten hinzugefügt [skip ci]"
            git push
          fi
